<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Grain texture filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="grain"/>
    </filter>
    <!-- Radial glow -->
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8530E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#141413" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#E8530E" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#141413"/>

  <!-- Grid pattern -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grain overlay -->
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.03"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#E8530E"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="120" rx="2" fill="#E8530E" opacity="0.8"/>

  <!-- FORGE brand -->
  <text x="108" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="#F0EFE9">
    FORGE
  </text>

  <!-- Dot separator -->
  <circle cx="375" cy="228" r="5" fill="#E8530E"/>

  <!-- Tagline line 1 -->
  <text x="108" y="305" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="-1" fill="#F0EFE9">
    AI-Powered Funnel Audit
  </text>

  <!-- Subtitle -->
  <text x="108" y="365" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#9A9890" letter-spacing="0.5">
    Real screenshots. AI annotations. Optimized blueprint.
  </text>

  <!-- CTA badge -->
  <rect x="108" y="410" width="200" height="44" rx="8" fill="#E8530E"/>
  <text x="138" y="439" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2" text-transform="uppercase">
    FREE SCAN
  </text>
  <!-- Arrow in CTA -->
  <path d="M266 428 L276 434 L266 440" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- URL -->
  <text x="108" y="540" font-family="ui-monospace, 'SF Mono', monospace" font-size="16" font-weight="600" fill="#E8530E" letter-spacing="1">
    forgewith.ai
  </text>

  <!-- Right side visual: abstract funnel/pipeline visualization -->
  <!-- Stage 1 -->
  <rect x="720" y="160" width="380" height="56" rx="8" fill="#1E1E1C" stroke="#E8530E" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="750" cy="188" r="8" fill="#E8530E" opacity="0.9"/>
  <text x="772" y="194" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#F0EFE9" letter-spacing="1">TRAFFIC SOURCES</text>
  <text x="1020" y="194" font-family="ui-monospace, monospace" font-size="14" font-weight="800" fill="#E8530E">72</text>
  <text x="1044" y="194" font-family="ui-monospace, monospace" font-size="11" fill="#9A9890">/100</text>

  <!-- Connector -->
  <line x1="910" y1="216" x2="910" y2="236" stroke="#E8530E" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Stage 2 -->
  <rect x="720" y="236" width="380" height="56" rx="8" fill="#1E1E1C" stroke="#E8530E" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="750" cy="264" r="8" fill="#D93636" opacity="0.9"/>
  <text x="772" y="270" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#F0EFE9" letter-spacing="1">LANDING PAGE</text>
  <text x="1020" y="270" font-family="ui-monospace, monospace" font-size="14" font-weight="800" fill="#D93636">34</text>
  <text x="1044" y="270" font-family="ui-monospace, monospace" font-size="11" fill="#9A9890">/100</text>

  <!-- Connector -->
  <line x1="910" y1="292" x2="910" y2="312" stroke="#E8530E" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Stage 3 -->
  <rect x="720" y="312" width="380" height="56" rx="8" fill="#1E1E1C" stroke="#E8530E" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="750" cy="340" r="8" fill="#D4890A" opacity="0.9"/>
  <text x="772" y="346" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#F0EFE9" letter-spacing="1">LEAD CAPTURE</text>
  <text x="1020" y="346" font-family="ui-monospace, monospace" font-size="14" font-weight="800" fill="#D4890A">51</text>
  <text x="1044" y="346" font-family="ui-monospace, monospace" font-size="11" fill="#9A9890">/100</text>

  <!-- Connector -->
  <line x1="910" y1="368" x2="910" y2="388" stroke="#E8530E" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Stage 4 -->
  <rect x="720" y="388" width="380" height="56" rx="8" fill="#1E1E1C" stroke="#E8530E" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="750" cy="416" r="8" fill="#2D8C4E" opacity="0.9"/>
  <text x="772" y="422" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#F0EFE9" letter-spacing="1">OFFER + CLOSE</text>
  <text x="1020" y="422" font-family="ui-monospace, monospace" font-size="14" font-weight="800" fill="#2D8C4E">78</text>
  <text x="1044" y="422" font-family="ui-monospace, monospace" font-size="11" fill="#9A9890">/100</text>

  <!-- Overall score badge -->
  <rect x="835" y="470" width="150" height="48" rx="10" fill="#E8530E"/>
  <text x="860" y="501" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">Score: 54</text>
</svg>
