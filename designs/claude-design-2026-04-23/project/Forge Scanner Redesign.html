<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forge Scanner · redesign</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="pages/landing.jsx"></script>
<script type="text/babel" src="pages/scan.jsx"></script>
<script type="text/babel" src="pages/capture-results.jsx"></script>
<script type="text/babel" src="pages/blueprint-chat.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

// Editmode defaults (persistable)
const TWEAKS = /*EDITMODE-BEGIN*/{
  "headline": "A",
  "voice": true,
  "industry": "medspa",
  "accent": 1
}/*EDITMODE-END*/;

function App() {
  const [state, setState] = useState(TWEAKS);
  const [showTweaks, setShowTweaks] = useState(false);

  // Edit-mode host bridge
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setShowTweaks(true);
      if (d.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateState = (patch) => {
    const next = { ...state, ...patch };
    setState(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  // Accent intensity via CSS var
  useEffect(() => {
    const a = state.accent ?? 1;
    const mix = `color-mix(in oklch, #E8530E ${Math.round(a * 100)}%, #6B6860)`;
    document.documentElement.style.setProperty("--accent", a === 1 ? "#E8530E" : mix);
  }, [state.accent]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="landing" title="01 · Landing" subtitle="Hero, how-it-works, FAQ, final CTA">
          <DCArtboard id="landing-d" label="Desktop · 1440" width={1440} height={2600}>
            <LandingDesktop headline={state.headline} />
          </DCArtboard>
          <DCArtboard id="landing-m" label="Mobile · 375" width={375} height={1700}>
            <LandingMobile headline={state.headline} />
          </DCArtboard>
        </DCSection>

        <DCSection id="scan" title="02 · Scan in progress" subtitle="Live streaming · milestones · activity log">
          <DCArtboard id="scan-d" label="Desktop · 1440" width={1440} height={1000}>
            <ScanDesktop voice={state.voice} />
          </DCArtboard>
          <DCArtboard id="scan-m" label="Mobile · 375" width={375} height={1100}>
            <ScanMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="capture" title="03 · Capture gate" subtitle="~15s slide-in · blur behind · send me the results">
          <DCArtboard id="capture-d" label="Desktop · 1440" width={1440} height={720}>
            <CaptureGate mobile={false} />
          </DCArtboard>
          <DCArtboard id="capture-m" label="Mobile · 375" width={375} height={720}>
            <CaptureGate mobile={true} />
          </DCArtboard>
        </DCSection>

        <DCSection id="results" title="04 · Results" subtitle="Money Model · per-stage · voice-guided · Give-Two-Pick-One">
          <DCArtboard id="results-d" label="Desktop · 1440" width={1440} height={2800}>
            <ResultsDesktop voice={state.voice} />
          </DCArtboard>
          <DCArtboard id="results-m" label="Mobile · 375" width={375} height={2000}>
            <ResultsMobile voice={state.voice} />
          </DCArtboard>
        </DCSection>

        <DCSection id="blueprint" title="05 · Blueprint · Grand Slam" subtitle="Med spa rebuild · MAGIC · value stack · anchor-first tiers · guarantee">
          <DCArtboard id="blueprint-d" label="Desktop · 1440" width={1440} height={3200}>
            <BlueprintDesktop />
          </DCArtboard>
          <DCArtboard id="blueprint-m" label="Mobile · 375" width={375} height={2200}>
            <BlueprintMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="chat" title="06 · AI sales chat · Vega" subtitle="Slides in at 30s no-booking · Give-Two-Pick-One fallback at msg ≥5">
          <DCArtboard id="chat-d" label="Desktop · 1440" width={1440} height={900}>
            <ChatDesktop />
          </DCArtboard>
          <DCArtboard id="chat-m" label="Mobile · 375" width={375} height={800}>
            <ChatMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {showTweaks && (
        <TweaksPanel state={state} onChange={updateState} onClose={() => setShowTweaks(false)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
